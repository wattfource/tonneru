# Hyprland window rules for tonneru
# Add these to your hyprland.conf

# Float the tonneru window
windowrule = float, title:(com.omarchy.tonneru)
windowrule = size 600 400, title:(com.omarchy.tonneru)
windowrule = center, title:(com.omarchy.tonneru)
windowrule = animation slide, title:(com.omarchy.tonneru)

# Optional: pin to all workspaces
# windowrule = pin, title:(com.omarchy.tonneru)

# Add to floating window tag (if using omarchy conventions)
windowrule = tag +floating-window, title:(com.omarchy.tonneru)

